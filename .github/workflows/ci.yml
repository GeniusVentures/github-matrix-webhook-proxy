name: Validate Worker

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Type-check Cloudflare Worker
        run: npm run typecheck
